<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NullDeps Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }
  </style>
</head>
<body>

  <ui-layout>
    <div id="app"></div>
  </ui-layout>

  <script type="module">
    import { Router } from '../src/nulldeps.js';
    import './pages/home-page.js';
    import './pages/counter-page.js';
    import './pages/tasks-page.js';
    import './pages/task-detail-page.js';
    import './pages/components-page.js';
    import './components/ui-button.js';
    import './components/ui-input.js';
    import './components/ui-select.js';
    import './components/ui-checkbox.js';
    import './components/ui-layout.js';

    // Hash-based routing — works on any static server
    const router = new Router('#app', { hash: true })
      .add('/', 'home-page')
      .add('/components', 'components-page')
      .add('/counter', 'counter-page')
      .add('/tasks', 'tasks-page')
      .add('/tasks/:id', 'task-detail-page')
      .add('/user/:id', 'user-page')
      .start();

    window.addEventListener('navigate', (e) => {
      router.navigate(e.detail.path);
    });
  </script>

</body>
</html>
